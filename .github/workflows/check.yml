name: Check
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup | Node
        uses: shun-shobon/actions/setup-node@38f26e71121faada44e5bfe4aea5d16697e14aa2 # master
        with:
          node-version-file: .tool-versions

      - name: Run | Lint
        run: pnpm lint

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup | Node
        uses: shun-shobon/actions/setup-node@38f26e71121faada44e5bfe4aea5d16697e14aa2 # master
        with:
          node-version-file: .tool-versions

      - name: Run | Format
        run: pnpm format:check
